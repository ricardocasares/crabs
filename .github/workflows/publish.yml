name: Publish

# Trigger by pushing a tag in the form:  <crate-name>-v<semver>
# Examples:
#   git tag better-auth-poem-v0.1.1 && git push --tags
#   git tag vercel-poem-v0.2.0     && git push --tags
#
# Before publishing a crate for the first time, bump its version in
# Cargo.toml, then create and push the matching tag.

on:
  push:
    tags:
      - "*-v[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Derive crate name from tag
        id: tag
        # Tag format: <crate-name>-v<version>  e.g. better-auth-poem-v0.1.1
        # Strip the trailing -v<semver> suffix to get the crate name.
        run: |
          TAG="${GITHUB_REF_NAME}"
          CRATE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "crate=${CRATE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing crate '${CRATE}' version '${VERSION}'"

      - name: Verify tag version matches Cargo.toml
        run: |
          CRATE="${{ steps.tag.outputs.crate }}"
          EXPECTED="${{ steps.tag.outputs.version }}"
          ACTUAL=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "
          import sys, json
          pkgs = json.load(sys.stdin)['packages']
          pkg = next((p for p in pkgs if p['name'] == '$CRATE'), None)
          print(pkg['version'] if pkg else 'NOT_FOUND')
          ")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "❌ Tag version ($EXPECTED) does not match Cargo.toml ($ACTUAL) for crate '$CRATE'"
            exit 1
          fi
          echo "✅ Version $ACTUAL matches tag"

      - name: Publish
        run: cargo publish -p ${{ steps.tag.outputs.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
