[[repos]]
repo = "local"

[[repos.hooks]]
id = "fmt"
name = "cargo fmt"
entry = "cargo fmt --all -- --check"
language = "system"
pass_filenames = false

[[repos.hooks]]
id = "clippy"
name = "cargo clippy"
entry = "cargo clippy --workspace --all-targets -- -D warnings"
language = "system"
pass_filenames = false
